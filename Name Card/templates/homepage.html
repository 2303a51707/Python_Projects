<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Professional Name Card</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
  }

  .card {
    background-color: #fff;
    width: 320px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
    padding: 40px 20px 30px 20px;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }

  .profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid transparent;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    padding: 3px;
    margin-bottom: 15px;
  }

  .name {
    font-size: 26px;
    font-weight: 700;
    color: #222;
    margin-bottom: 5px;
  }

  .designation {
    font-size: 14px;
    font-weight: 500;
    color: #555;
    margin-bottom: 20px;
  }

  .separator {
    height: 1px;
    background-color: #e0e0e0;
    margin: 20px 0;
  }

  .contact-info {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .social-icons {
    display: flex;
    justify-content: center;
    gap: 25px;
  }

  .social-icons a {
    text-decoration: none;
    color: #555;
    font-size: 22px;
    transition: transform 0.3s, color 0.3s;
  }

  .social-icons a:hover {
    transform: scale(1.3);
  }

  .facebook:hover { color: #3b5998; }
  .instagram:hover { color: #E1306C; }
  .linkedin:hover { color: #0077b5; }

</style>
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'>
</head>
<body>
  <div class='card'>
    <img src='static/dp.jpeg' alt='Profile' class='profile-img'>
    <div class='name'>Vighnesh Velpula</div>
    <div class='designation'>Software Engineer</div>
    <div class='separator'></div>
    <div class='contact-info'>
      Email: vighneshvelpula10@gmail.com<br>
      Phone: +91 7569140644
    </div>
    <div class='social-icons'>
      <a href='https://facebook.com/' target='_blank' class='facebook'><i class='fab fa-facebook-f'></i></a>
      <a href='https://instagram.com/' target='_blank' class='instagram'><i class='fab fa-instagram'></i></a>
      <a href='https://linkedin.com/' target='_blank' class='linkedin'><i class='fab fa-linkedin-in'></i></a>
    </div>
  </div>
</body>
</html>
